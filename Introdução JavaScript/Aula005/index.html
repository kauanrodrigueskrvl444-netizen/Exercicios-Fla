<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Introdução JavaScript</h1>

    <script>
        let primeiroNumero = Number (prompt ("Digite seu primeiro numero: "))
        let segundoNumero = Number (prompt ("Digite seu segundo numero: "))
        let soma = primeiroNumero * segundoNumero

        alert(primeiroNumero + "*" + segundoNumero + "*" + soma)
    </script>
</body>
</html>
